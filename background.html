<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="title">Background changer</div>
        <h1 id="corAtual">A cor usada é: #E6E6E6</h1>
        <div class="background-controls">
            <div class="button orange" onclick="mudarCorClasse('bg-orange', 'orange')"></div>
            <div class="button skin-color" onclick="mudarCorClasse('bg-skin', '#f5c2a0')"></div>
            <div class="button light-green" onclick="mudarCorClasse('bg-lightgreen', 'lightgreen')"></div>
            <div class="button green" onclick="mudarCorClasse('bg-green', 'green')"></div>
            <div class="button pink" onclick="mudarCorClasse('bg-pink', 'pink')"></div>
        </div>
        <input class="input" id="cor" type="text" placeholder="Escolha uma cor">
        <div class="button-main" onclick="escolherCor()">Mudar cor</div>
        <input class="input" id="nome" type="text" placeholder="Digite o seu nome">
        <div class="mensagem" id="mensagem"></div>
        <div class="button-main" onclick="guardarNome()">Guardar</div>

        <div class="button-main" onclick="mudarCorAleatorio()">Sortear</div>
        <div class="button-main" onclick="mudarCorTemporaria()">Cor temporária</div>
        <div class="button-main" onclick="mostrarHora()">Hora</div>
        <div class="button-main" onclick="apagarTudo()">Apagar tudo</div>
        <div class="hora" id="hora">Hora e data</div>
        <div class="button-main" id="contador" onclick="contador()">Contador</div>
        <input class="input" type="text" id="cidadeInput" placeholder="Para onde viajar" oninput="actualizaViajar()">
        <p class="hora" id="destino" oninput="actualizarViagem()"></p>
        <input class="input" type="text" id="limparInput" placeholder="Digite o nome">
        <div class="button-main" onclick="limparInput()">Limpar nome</div>
        <div class="div-background" id="div-apagar">
            <div>olá mundo apagar</div>
            <div>olá mundo apagar</div>
        </div>
        <div class="button-main" onclick="apagarDiv()">Limpar div</div>
        <div class="grid-row">
            <input class="input" id="nome" type="text" placeholder="Digite o 1º número">
            <input class="input" id="nome" type="text" placeholder="Digite o 2º número">
        </div>
        <div class="button-main">Efetuar soma</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
